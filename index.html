<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باقي. | Baqi</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --primary: #2563eb; --sub: #6b7280;
        }
        .dark-theme {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --primary: #60a5fa; --sub: #9ca3af;
        }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding-bottom: 50px; }
        header { text-align: center; padding: 30px; position: relative; }
        .controls { position: absolute; left: 20px; top: 20px; display: flex; gap: 10px; }
        button { cursor: pointer; border: none; padding: 8px 15px; border-radius: 10px; font-family: inherit; font-size: 0.8rem; background: var(--card); color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .container { width: 90%; max-width: 700px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; position: relative; transition: 0.3s; border: 1px solid transparent; }
        .card.pinned { border: 2px solid var(--primary); order: -1; }
        .pin-btn { position: absolute; top: 15px; left: 15px; font-size: 1.2rem; cursor: pointer; filter: grayscale(1); }
        .card.pinned .pin-btn { filter: grayscale(0); }

        .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .num { font-size: 1.8rem; font-weight: 700; color: var(--primary); display: block; }
        .label { font-size: 0.75rem; color: var(--sub); }

        .card-actions { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .cal-link { font-size: 0.7rem; color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 4px 8px; border-radius: 8px; }
        
        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; color: var(--sub); }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <button onclick="toggleDark()">🌙</button>
        <button onclick="toggleCalendarType()" id="calTypeBtn">تحويل للميلادي</button>
    </div>
    <h1 style="color:var(--primary); margin:0;">باقي.</h1>
    <p style="color:var(--sub);">مواعيدك في جيبك</p>
</header>

<div class="container" id="mainContainer">
    <div class="card" id="card-salary">
        <span class="pin-btn" onclick="togglePin('card-salary')">📍</span>
        <div style="font-weight:600;">رواتب الموظفين (أبريل)</div>
        <div style="font-size:0.75rem; color:var(--sub);" class="date-display" data-h="27 شوال" data-m="27 April">27 شوال</div>
        <div class="timer-grid">
            <div class="unit"><span class="num" id="s-d">00</span><span class="label">يوم</span></div>
            <div class="unit"><span class="num" id="s-h">00</span><span class="label">ساعة</span></div>
            <div class="unit"><span class="num" id="s-m">00</span><span class="label">دقيقة</span></div>
        </div>
        <div class="card-actions">
            <a href="#" class="cal-link" onclick="addToCalendar('راتب أبريل', '2026-04-27')">🗓 أضف للتقويم</a>
        </div>
    </div>

    <div class="card" id="card-uni">
        <span class="pin-btn" onclick="togglePin('card-uni')">📍</span>
        <div style="font-weight:600;">مكافأة الطلاب الجامعيين</div>
        <div style="font-size:0.75rem; color:var(--sub);" class="date-display" data-h="10 شوال" data-m="26 April">10 شوال</div>
        <div class="timer-grid">
            <div class="unit"><span class="num" id="u-d">00</span><span class="label">يوم</span></div>
            <div class="unit"><span class="num" id="u-h">00</span><span class="label">ساعة</span></div>
            <div class="unit"><span class="num" id="u-m">00</span><span class="label">دقيقة</span></div>
        </div>
        <div class="card-actions">
            <a href="#" class="cal-link" onclick="addToCalendar('مكافأة الجامعة', '2026-04-26')">🗓 أضف للتقويم</a>
        </div>
    </div>

    <div class="card" id="card-vac">
        <span class="pin-btn" onclick="togglePin('card-vac')">📍</span>
        <div style="font-weight:600;">أقرب إجازة مطولة</div>
        <div style="font-size:0.75rem; color:var(--sub);" class="date-display" data-h="16 ذو القعدة" data-m="02 May">16 ذو القعدة</div>
        <div class="timer-grid">
            <div class="unit"><span class="num" id="v-d">00</span><span class="label">يوم</span></div>
            <div class="unit"><span class="num" id="v-h">00</span><span class="label">ساعة</span></div>
            <div class="unit"><span class="num" id="v-m">00</span><span class="label">دقيقة</span></div>
        </div>
    </div>
</div>

<footer>
    <div style="margin-bottom:10px;">
        <a href="#" style="color:var(--sub); text-decoration:none; margin:0 10px;">سياسة الخصوصية</a>
        <a href="#" style="color:var(--sub); text-decoration:none; margin:0 10px;">اتصل بنا</a>
    </div>
    <p>© 2026 باقي. - جميع الحقوق محفوظة</p>
</footer>

<script>
    // نظام الـ Dark Mode
    function toggleDark() { document.body.classList.toggle('dark-theme'); }

    // تحويل التاريخ (هجري/ميلادي)
    let isHijri = true;
    function toggleCalendarType() {
        isHijri = !isHijri;
        document.getElementById('calTypeBtn').innerText = isHijri ? "تحويل للميلادي" : "تحويل للهجري";
        document.querySelectorAll('.date-display').forEach(el => {
            el.innerText = isHijri ? el.dataset.h : el.dataset.m;
        });
    }

    // ميزة التثبيت (Pin)
    function togglePin(id) {
        document.getElementById(id).classList.toggle('pinned');
    }

    // إضافة للتقويم (تفتح ملف تقويم بسيط)
    function addToCalendar(title, date) {
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${date.replace(/-/g, '')}/${date.replace(/-/g, '')}`;
        window.open(url, '_blank');
    }

    // تشغيل العدادات
    function setupTimer(idPrefix, dateStr) {
        const target = new Date(dateStr).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) return;
            document.getElementById(idPrefix+'-d').innerText = Math.floor(diff / 86400000);
            document.getElementById(idPrefix+'-h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById(idPrefix+'-m').innerText = Math.floor((diff % 3600000) / 60000);
        }, 1000);
    }

    setupTimer('s', '2026-04-27');
    setupTimer('u', '2026-04-26');
    setupTimer('v', '2026-05-02');
</script>
</body>
</html>
